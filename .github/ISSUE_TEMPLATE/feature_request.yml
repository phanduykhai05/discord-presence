name: Feature request
description: Suggest an idea or improvement
labels: ['enhancement']
body:
  - type: markdown
    attributes:
      value: Thanks for the idea! A little context on the problem you're solving helps a lot.

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do, and what's getting in the way?
      placeholder: I stream on Discord and want a theme that never reveals my project name.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see?
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      description: Roughly, what area is this?
      options:
        - New theme
        - New provider (Gemini, Codex, etc.)
        - Config / UX
        - Other
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you thought about?
    validations:
      required: false
